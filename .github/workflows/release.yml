name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/build.yml

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v7
      - name: Generate checksums
        run: |
          cd wheels-linux-x86_64 && sha256sum * >> ../checksums.txt && cd ..
          cd wheels-linux-aarch64 && sha256sum * >> ../checksums.txt && cd ..
          cd wheels-windows-x64 && sha256sum * >> ../checksums.txt && cd ..
          cd wheels-macos-aarch64 && sha256sum * >> ../checksums.txt && cd ..
          cd wheels-sdist && sha256sum * >> ../checksums.txt && cd ..
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: 'wheels-*/*'
      - uses: taiki-e/install-action@v2
        with:
          tool: git-cliff@2
      - name: Generate release notes
        run: git-cliff --tag "$GITHUB_REF_NAME" --latest --output release-notes.md
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" wheels-*/* checksums.txt --clobber
