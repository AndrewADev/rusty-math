name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  commits:
    name: Commit messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install conform
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest=$(gh release list --repo siderolabs/conform --limit 1 --json tagName --jq '.[0].tagName')
          gh release download "$latest" --repo siderolabs/conform --pattern 'conform-linux-amd64' --dir /tmp
          install -m 755 /tmp/conform-linux-amd64 /usr/local/bin/conform
      - name: Lint
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          git log --format='%H' "${BASE}".."${HEAD}" | while read sha; do
            git log -1 --format='%B' "$sha" > /tmp/msg.txt
            conform enforce --commit-msg-file /tmp/msg.txt
          done

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build and install
        run: |
          uv sync --dev
          uv run maturin develop
      - name: Run tests
        run: uv run pytest tests/
      - name: Check types
        run: uv run pyright tests/
