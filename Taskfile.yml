version: '3'

tasks:
  build:
    cmds:
      - uv run maturin develop

  test:
    deps: [build]
    cmds:
      - uv run pytest tests/

  stub:
    cmds:
      - cargo run --bin stub_gen

  version:
    cmds:
      - cargo set-version {{.CLI_ARGS}}

  release:
    silent: true
    cmds:
      - |
        git fetch --tags
        next=$(git cliff --bumped-version)
        bump_and_tag() {
          task version -- ${1#v}
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to ${1}"
          git tag "${1}"
        }
        if git tag | grep -q "^${next}$"; then
          echo "Resuming aborted release ${next}..."
        else
          bump_and_tag "${next}"
        fi
        echo "next=${next}" > .release_env
        echo "Ready to release ${next}."
      - task: release-push

  release-push:
    internal: true
    silent: true
    prompt: "Push to origin?"
    cmds:
      - |
        . .release_env
        git push origin main "${next}"
        rm .release_env
