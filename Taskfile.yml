version: '3'

tasks:
  build:
    cmds:
      - uv run maturin develop

  test:
    deps: [build]
    cmds:
      - uv run pytest tests/

  stub:
    cmds:
      - cargo run --bin stub_gen

  version:
    cmds:
      - cargo set-version {{.CLI_ARGS}}

  release:
    cmds:
      - |
        next=$(git cliff --bumped-version)
        if git tag | grep -q "^${next}$"; then
          echo "Resuming aborted release ${next}..."
        else
          task version -- ${next#v}
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to ${next}"
          git tag "${next}"
        fi
        echo "NEXT_TAG=${next}" > .release_env
      - task: release-push

  release-push:
    internal: true
    prompt: "Push to origin and trigger release?"
    cmds:
      - |
        source .release_env
        git push origin main "${NEXT_TAG}"
        rm .release_env
