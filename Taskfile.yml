version: '3'

tasks:
  build:
    cmds:
      - uv run maturin develop

  test:
    deps: [build]
    cmds:
      - uv run pytest tests/

  stub:
    cmds:
      - cargo run --bin stub_gen

  version:
    cmds:
      - cargo set-version {{.CLI_ARGS}}

  release:
    cmds:
      - |
        next=$(git cliff --bumped-version)
        bump_and_tag() {
          if ! grep -q "^version = \"${1#v}\"" Cargo.toml; then
            task version -- ${1#v}
            git add Cargo.toml Cargo.lock
            git commit -m "chore: bump version to ${1}"
          fi
          git tag "${1}"
        }
        if git tag | grep -q "^${next}$"; then
          if git merge-base --is-ancestor "${next}" HEAD; then
            echo "Resuming aborted release ${next}..."
          else
            echo "Tag ${next} exists but is unreachable from HEAD — recreating..."
            git tag -d "${next}"
            bump_and_tag "${next}"
          fi
        else
          bump_and_tag "${next}"
        fi
      - task: release-push

  release-push:
    internal: true
    prompt: "Push to origin and trigger release?"
    cmds:
      - git push origin main "$(git describe --tags --abbrev=0)"
