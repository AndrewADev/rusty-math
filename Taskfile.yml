version: '3'

tasks:
  build:
    cmds:
      - uv run maturin develop

  test:
    deps: [build]
    cmds:
      - uv run pytest tests/

  stub:
    cmds:
      - cargo run --bin stub_gen

  version:
    cmds:
      - cargo set-version {{.CLI_ARGS}}

  release:
    silent: true
    cmds:
      - |
        git fetch --tags --force
        next=$(git cliff --bumped-version)
        bump_and_tag() {
          task version -- ${1#v}
          git add Cargo.toml Cargo.lock
          if ! git diff --cached --quiet; then
            git commit -m "chore: bump version to ${1}"
          fi
          git tag "${1}"
        }
        if git ls-remote --tags origin | grep -q "refs/tags/${next}$"; then
          if ! git merge-base --is-ancestor "${next}" HEAD; then
            echo "Error: ${next} exists on remote but is not in local history."
            exit 1
          fi
          echo "Resuming aborted release ${next}..."
        elif git tag | grep -q "^${next}$"; then
          echo "Error: ${next} exists locally but is not an ancestor of HEAD. Delete or move the tag manually."
          exit 1
        else
          bump_and_tag "${next}"
        fi
        echo "next=${next}" > .release_env
        echo "Ready to release ${next}."
      - task: release-push

  release-push:
    internal: true
    silent: true
    prompt: "Push to origin?"
    cmds:
      - |
        . .release_env
        git push origin main "${next}"
        rm .release_env
